name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install latest CMake
        uses: lukka/get-cmake@latest

      - name: Install build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            ninja-build clang

      - name: Bootstrap vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git ${{ runner.temp }}/vcpkg
          ${{ runner.temp }}/vcpkg/bootstrap-vcpkg.sh -disableMetrics

      - name: Cache vcpkg packages
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/vcpkg_installed
          key: vcpkg-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}

      - name: Configure
        env:
          VCPKG_ROOT: ${{ runner.temp }}/vcpkg
          CC: clang
          CXX: clang++
        run: cmake --preset ci

      - name: Build
        run: cmake --build build/ci

      - name: Test
        run: ctest --test-dir build/ci --output-on-failure --timeout 120
